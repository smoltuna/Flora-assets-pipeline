# Kubernetes Secret template for Flora Asset Pipeline.
#
# IMPORTANT: Do NOT commit real secrets to version control.
# Populate values with base64-encoded strings:
#   echo -n "your-value" | base64
#
# Apply with:
#   kubectl apply -f k8s/secrets.yaml
#   kubectl apply -f k8s/

apiVersion: v1
kind: Secret
metadata:
  name: flora-secrets
  labels:
    app: flora
type: Opaque
data:
  # postgresql+asyncpg://flora:<password>@<rds-endpoint>:5432/flora
  # Get RDS endpoint from: terraform output rds_endpoint
  database-url: cG9zdGdyZXNxbCthc3luY3BnOi8vZmxvcmE6Q0hBTkdFTUVAcmRzLWVuZHBvaW50OjU0MzIvZmxvcmE=

  # Groq API key from console.groq.com
  groq-api-key: Q0hBTkdFTUU=

  # Together.ai API key (optional fallback)
  together-api-key: Q0hBTkdFTUU=

  # AWS credentials (for S3 artifact storage)
  aws-access-key-id: Q0hBTkdFTUU=
  aws-secret-access-key: Q0hBTkdFTUU=

  # Replicate API token (optional, for SDXL lock images)
  replicate-api-token: Q0hBTkdFTUU=
