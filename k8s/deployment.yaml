apiVersion: apps/v1
kind: Deployment
metadata:
  name: flora-backend
  labels:
    app: flora-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flora-backend
  template:
    metadata:
      labels:
        app: flora-backend
    spec:
      containers:
        - name: backend
          image: flora-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flora-secrets
                  key: database-url
            - name: LLM_PROVIDER
              value: groq
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: flora-secrets
                  key: groq-api-key
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flora-frontend
  labels:
    app: flora-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flora-frontend
  template:
    metadata:
      labels:
        app: flora-frontend
    spec:
      containers:
        - name: frontend
          image: flora-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://flora-backend:8000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
